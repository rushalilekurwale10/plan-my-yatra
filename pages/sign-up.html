<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup-Plan My Yatra</title>
    <link rel="stylesheet" href="./../css/style.css">
    <link rel="stylesheet" href="./../css/navbar.css">
    <link rel="stylesheet" href="./../css/footer.css">
    <link rel="stylesheet" href="./../css/sign-up.css">
</head>

<body>
    <!--Navbar-->
    <div class="main-container">
        <div class="img-container">
            <img src="./../images/main-logo.jpg" alt="logo" class="main-logo">
            <h1 class="website-name">Plan My <span style="color: #E65018;">Yatra</span></h1>
        </div>
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <img src="./../images/hamburger.svg" height="30px" width="30px">
        </label>
        <div class="nav-menu">
            <a href="./../index.html" class="menu">Home</a>
            <a href="./destination.html" class="menu">Destination</a>
            <a href="./plantrip.html" class="menu">Plan Trip</a>
            <a href="./about.html" class="menu">About</a>
            <a href="./contact.html" class="menu">Contact</a>
        </div>
        <div class="nav-menu">
            <a href="./login.html" class="menu">Login</a>
            <a href="./sign-up.html" class="menu">Sign Up</a>
        </div>
    </div>
    <div class="signup-box">
        <h2>Create Account</h2>
        <form>
            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First name" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>

            <div class="checkbox">
                <input type="checkbox" required>
                <label>I agree to Terms & Conditions</label>
            </div>

            <button class="btn">Sign Up</button>
        </form>
        <div class="divider">OR</div>

        <button class="social-btn google">Sign up with Google</button>
        <div class="login-link">
            <p>Already have an account? <a href="#">Login</a></p>
        </div>

    </div>


</body>

</html>
