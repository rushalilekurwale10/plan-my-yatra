<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan My Yatra - Plan Trip</title>
  <link rel="stylesheet" href="./../css/style.css">
  <link rel="stylesheet" href="./../css/navbar.css">
  <link rel="stylesheet" href="./../css/footer.css">
  <link rel="stylesheet" href="./../css/plantrip.css">
</head>

<body>
  <div class="main-hero-section">
    <!--Navbar-->
    <div class="main-container">
      <div class="img-container">
        <img src="./../images/main-logo.jpg" alt="logo" class="main-logo">
        <h1 class="website-name">Plan My <span style="color: #E65018;">Yatra</span></h1>
      </div>
      <input type="checkbox" id="menu-toggle" class="menu-toggle">
      <label for="menu-toggle" class="hamburger">
        <img src="./../images/hamburger.svg" height="30px" width="30px">
      </label>
      <div class="nav-menu">
        <a href="./index.html" class="menu">Home</a>
        <a href="./pages/destination.html" class="menu">Destination</a>
        <a href="./plantrip.html" class="menu">Plan Trip</a>
        <a href="" class="menu">About</a>
        <a href="" class="menu">Contact</a>
      </div>
      <div class="nav-menu">
        <a href="" class="menu">Login</a>
        <a href="" class="menu">Sign Up</a>
      </div>
    </div>
    <section class="hero">
      <h1>Plan Your Perfect Trip</h1>
    </section>

    <section class="form-section">
      <h2>Trip Planning Form</h2>
      <form>

        <div class="row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email">
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Destination</label>
            <input type="text" placeholder="Where do you want to go?">
          </div>

          <div class="form-group">
            <label>Travelers</label>
            <input type="number" placeholder="Number of people">
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date">
          </div>

          <div class="form-group">
            <label>End Date</label>
            <input type="date">
          </div>
        </div>

        <div class="form-group">
          <label>Budget Range</label>
          <select>
            <option>Select Budget</option>
            <option>₹ 5,000 - ₹ 10,000</option>
            <option>₹ 10,000 - ₹ 25,000</option>
            <option>₹ 25,000+</option>
          </select>
        </div>

        <div class="form-group">
          <label>Preferred Activities</label>
          <div class="checkbox-group">
            <label><input type="checkbox"> Adventure</label>
            <label><input type="checkbox"> Beach</label>
            <label><input type="checkbox"> Cultural</label>
            <label><input type="checkbox"> Wildlife</label>
            <label><input type="checkbox"> Shopping</label>
          </div>
        </div>

        <div class="form-group">
          <label>Additional Requirements</label>
          <textarea placeholder="Any special needs..."></textarea>
        </div>

      </form>

      <div class="summary">
        <h3>Why Choose Us?</h3>
        <p>✔ Personalized itinerary</p>
        <p>✔ Affordable packages</p>
        <p>✔ Trusted by thousands</p>
      </div>

    </section>


</body>

</html>
