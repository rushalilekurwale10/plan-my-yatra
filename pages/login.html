<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login-Plan My Yatra</title>
    <link rel="stylesheet" href="./../css/style.css">
    <link rel="stylesheet" href="./../css/navbar.css">
    <link rel="stylesheet" href="./../css/footer.css">
    <link rel="stylesheet" href="./../css/login.css">
</head>

<body>
    <!--Navbar-->
    <div class="main-container">
        <div class="img-container">
            <img src="./../images/main-logo.jpg" alt="logo" class="main-logo">
            <h1 class="website-name">Plan My <span style="color: #E65018;">Yatra</span></h1>
        </div>
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <img src="./../images/hamburger.svg" height="30px" width="30px">
        </label>
        <div class="nav-menu">
            <a href="./../index.html" class="menu">Home</a>
            <a href="./destination.html" class="menu">Destination</a>
            <a href="./plantrip.html" class="menu">Plan Trip</a>
            <a href="./about.html" class="menu">About</a>
            <a href="./contact.html" class="menu">Contact</a>
        </div>
        <div class="nav-menu">
            <a href="./login.html" class="menu">Login</a>
            <a href="./sign-up.html" class="menu">Sign Up</a>
        </div>
    </div>
    <div class="login-container">
        <h2>Login</h2>
        <form>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button class="btn">Login</button>
        </form>
        <div class="social-login">
            <p>Or login with</p>
            <button class="google">Login with Google</button>
        </div>

        <div class="register">
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>

    </div>

</body>

</html>
